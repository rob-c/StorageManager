name: Release

# Build self-contained single-file binaries for all platforms and attach them
# to a GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish all platforms
        run: |
          set -e
          # Stamp the binary with the tag version (strip the leading 'v').
          VERSION="${GITHUB_REF_NAME#v}"
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            dotnet publish src/StorageManager/StorageManager.csproj \
              -r "$rid" -c Release --self-contained \
              -p:PublishSingleFile=true \
              -p:IncludeNativeLibrariesForSelfExtract=true \
              -p:DebugType=none \
              -p:Version="${VERSION}" \
              -o "dist/$rid"
          done

      # Ad-hoc code signing tool so unsigned macOS binaries launch on Apple
      # Silicon. Best-effort — the packaging step continues if this fails.
      - name: Install rcodesign (macOS ad-hoc signing)
        continue-on-error: true
        run: cargo install apple-codesign --quiet

      # ImageMagick isn't on ubuntu-latest by default; needed to scale the app
      # logo into the macOS .icns size ladder (Linux falls back to the 256px
      # source, but install it so both build the full-quality icon).
      - name: Install ImageMagick (icon scaling)
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Package and checksum artifacts
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p out

          # Windows: the plain exe is already double-clickable.
          cp dist/win-x64/StorageManager.exe out/StorageManager-win-x64.exe

          # Linux: bundle the binary with a .desktop entry + icon (shows the
          # logo in menus and file managers) and tar.gz it so +x survives.
          chmod +x dist/linux-x64/StorageManager
          bash packaging/make-linux-tarball.sh dist/linux-x64/StorageManager "$VERSION" out

          # macOS: build a double-clickable .app bundle per arch, zipped (keeps +x).
          for arch in osx-x64 osx-arm64; do
            chmod +x "dist/$arch/StorageManager"
            bash packaging/make-macos-app.sh "dist/$arch/StorageManager" "$arch" "$VERSION" out
          done

          cd out && sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" out/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
